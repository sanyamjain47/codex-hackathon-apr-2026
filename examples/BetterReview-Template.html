<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BetterReview · Codex PR</title>
  <style>
:root {
  --ink:        oklch(0.16 0.012 70);
  --ink-2:      oklch(0.28 0.010 70);
  --ink-soft:   oklch(0.55 0.008 70);
  --ink-mute:   oklch(0.70 0.006 70);
  --paper:      oklch(0.965 0.008 80);
  --paper-2:    oklch(0.945 0.010 80);
  --paper-3:    oklch(0.91  0.012 80);
  --canvas:     oklch(0.92  0.010 78);
  --canvas-deep: oklch(0.86  0.012 76);

  --accent:     oklch(0.78 0.16 145);
  --accent-ink: oklch(0.42 0.12 145);
  --accent-soft: oklch(0.93 0.05 145);

  --warn:       oklch(0.72 0.14 65);
  --warn-soft:  oklch(0.94 0.05 65);
  --danger:     oklch(0.58 0.16 25);
  --danger-soft: oklch(0.93 0.05 25);

  --shadow-card: 0 1px 0 oklch(0 0 0 / 0.04), 0 12px 28px -10px oklch(0 0 0 / 0.18), 0 2px 6px -2px oklch(0 0 0 / 0.10);
  --shadow-deep: 0 24px 60px -22px oklch(0 0 0 / 0.30);

  --radius: 14px;
  --radius-sm: 8px;

  --font-sans: "Geist", ui-sans-serif, system-ui, sans-serif;
  --font-mono: "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;
  --font-serif: "Fraunces", Georgia, serif;
}

* { box-sizing: border-box; }
html, body, #root { height: 100%; margin: 0; }
body {
  font-family: var(--font-sans);
  color: var(--ink);
  background: var(--canvas);
  background-image:
    radial-gradient(circle at 1px 1px, oklch(0 0 0 / 0.07) 1px, transparent 0);
  background-size: 22px 22px;
  background-position: -1px -1px;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  letter-spacing: -0.005em;
}

button { font-family: inherit; color: inherit; cursor: pointer; }
code, pre, kbd { font-family: var(--font-mono); }
kbd {
  font-size: 11px;
  padding: 2px 6px;
  border: 1px solid var(--ink-soft);
  border-bottom-width: 2px;
  border-radius: 4px;
  background: var(--paper);
}

/* ---------- app shell ---------- */
.app {
  height: 100vh;
  display: grid;
  grid-template-rows: 56px 1fr 88px;
}

/* ---------- topbar ---------- */
.topbar {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 0 18px;
  border-bottom: 1px solid oklch(0 0 0 / 0.08);
  background: oklch(0.93 0.010 80 / 0.85);
  backdrop-filter: blur(10px);
  z-index: 5;
}
.topbar-l { justify-self: start; }
.topbar-c { justify-self: center; }
.topbar-r { justify-self: end; display: flex; gap: 14px; align-items: center; }

.brand {
  display: inline-flex; align-items: center; gap: 10px;
  background: none; border: 0; padding: 4px 8px; border-radius: 8px;
}
.brand:hover { background: oklch(0 0 0 / 0.04); }
.brand-mark {
  width: 26px; height: 26px;
  display: grid; place-items: center;
  background: var(--ink); color: var(--paper);
  border-radius: 6px;
}
.brand-name { font-weight: 600; letter-spacing: -0.01em; font-size: 15px; }
.brand-sub { color: var(--ink-soft); font-family: var(--font-mono); font-size: 12px; }

.crumbs { display: flex; gap: 8px; align-items: center; font-size: 13px; color: var(--ink-soft); }
.crumb-active { color: var(--ink); font-weight: 500; }
.crumb-mono { font-family: var(--font-mono); font-size: 12px; padding: 1px 6px; background: var(--paper); border: 1px solid oklch(0 0 0 / 0.08); border-radius: 4px; }
.crumb-sep { color: var(--ink-mute); }

.counters { display: flex; gap: 12px; font-size: 12px; }
.counter { display: inline-flex; gap: 6px; align-items: center; color: var(--ink-2); font-variant-numeric: tabular-nums; }
.dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
.dot-approve { background: var(--accent); }
.dot-changes { background: var(--warn); }
.dot-skip    { background: var(--ink-mute); }

.agent-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 10px;
  border: 1px solid oklch(0 0 0 / 0.10);
  border-radius: 999px;
  font-family: var(--font-mono);
  font-size: 11px;
  background: var(--paper);
}
.agent-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 0 3px var(--accent-soft); }

/* ---------- stage / canvas ---------- */
.stage { position: relative; overflow: hidden; }
.canvas-clip {
  position: absolute; inset: 0;
  overflow: hidden;
}
.canvas {
  position: absolute; inset: 0;
  transition: transform 480ms cubic-bezier(0.22, 1, 0.36, 1);
  will-change: transform;
}
.col {
  position: absolute; top: 0;
  width: 100vw; height: 100%;
  overflow: hidden;
}
.col-stack {
  position: absolute; inset: 0;
  transition: transform 480ms cubic-bezier(0.22, 1, 0.36, 1);
}
.cell {
  position: absolute;
  left: 0; right: 0;
  height: 100%;
  padding: 18px 200px 18px 32px;
  display: grid;
  place-items: stretch;
  transition: opacity 300ms ease, transform 300ms ease, filter 300ms ease;
}
.cell:not(.cell-focus) {
  opacity: 0.35;
  filter: blur(1px);
  transform: scale(0.98);
}

/* ---------- card chrome ---------- */
.card {
  position: relative;
  background: var(--paper);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  border: 1px solid oklch(0 0 0 / 0.06);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.card-edge {
  position: absolute; top: 0; left: 0; right: 0;
  padding: 8px 18px;
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.06em;
  color: var(--ink-soft);
  background: var(--paper-2);
  border-bottom: 1px solid oklch(0 0 0 / 0.06);
  display: flex; gap: 8px; align-items: center;
}
.edge-sep { color: var(--ink-mute); }
.edge-kind { padding: 0 6px; background: var(--paper); border: 1px solid oklch(0 0 0 / 0.08); border-radius: 3px; }

/* ---------- overview card ---------- */
.card-overview { padding: 36px 44px 18px; min-height: 0; overflow: hidden; }
.ov-grid {
  display: grid;
  grid-template-columns: 1.2fr 1fr 1fr;
  grid-template-rows: 1fr auto;
  grid-template-areas:
    "head     bullets  risks"
    "howto    howto    howto";
  gap: 16px 36px;
  align-content: start;
  height: 100%;
  min-height: 0;
}
.ov-head    { grid-area: head;    min-width: 0; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
.ov-headline { display: none; }
.ov-intent-col { display: none; }
.ov-bullets { grid-area: bullets; min-width: 0; min-height: 0; overflow: hidden; padding-left: 24px; border-left: 1px dashed oklch(0 0 0 / 0.12); display: flex; flex-direction: column; }
.ov-risks   { grid-area: risks;   min-width: 0; min-height: 0; overflow: hidden; padding-left: 24px; border-left: 1px dashed oklch(0 0 0 / 0.12); display: flex; flex-direction: column; }
.ov-howto   { grid-area: howto;   padding-top: 12px; border-top: 1px dashed oklch(0 0 0 / 0.12); }

.ov-tag {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  padding: 4px 10px;
  background: var(--ink);
  color: var(--paper);
  border-radius: 4px;
  margin-bottom: 18px;
}
.ov-title {
  font-family: var(--font-serif);
  font-weight: 600;
  font-size: clamp(28px, 2.6vw, 38px);
  line-height: 1.04;
  letter-spacing: -0.022em;
  margin: 6px 0 0;
  text-wrap: balance;
  max-width: 26ch;
}
.ov-intent {
  font-family: var(--font-serif);
  font-weight: 400;
  font-size: 15px;
  line-height: 1.4;
  color: var(--ink);
  margin: 8px 0 0;
  text-wrap: pretty;
  letter-spacing: -0.005em;
}

.ov-meta {
  margin-top: 14px;
  display: flex;
  flex-wrap: wrap;
  gap: 4px 14px;
  font-size: 11px;
  color: var(--ink-soft);
}
.ov-meta > div { display: flex; align-items: baseline; gap: 6px; }
.ov-meta code { font-family: var(--font-mono); font-size: 11px; color: var(--ink-2); }
.ov-meta label { font-family: var(--font-mono); font-size: 9.5px; opacity: 0.6; text-transform: uppercase; letter-spacing: 0.06em; }
.ov-meta label { font-family: var(--font-mono); margin-right: 8px; opacity: 0.7; }
.ov-meta code { color: var(--ink); font-size: 12px; }
.add { color: var(--accent-ink); }
.del { color: var(--danger); }

.kicker {
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.10em;
  color: var(--ink-soft);
  margin-bottom: 10px;
}
.ov-headline h2 {
  font-family: var(--font-serif);
  font-weight: 400;
  font-size: 22px;
  line-height: 1.2;
  margin: 0;
  letter-spacing: -0.01em;
  text-wrap: pretty;
}

.ov-bullets ol { margin: 8px 0 0; padding: 0; list-style: none; counter-reset: b; }
.ov-bullets li {
  counter-increment: b;
  padding: 5px 0 5px 26px;
  border-top: 1px solid oklch(0 0 0 / 0.06);
  font-size: 11.5px; line-height: 1.4;
  position: relative;
}
.ov-bullets li::before {
  content: counter(b, decimal-leading-zero);
  position: absolute; left: 0; top: 6px;
  font-family: var(--font-mono);
  font-size: 10px; color: var(--ink-soft);
}
.ov-bullets li:last-child { border-bottom: 1px solid oklch(0 0 0 / 0.06); }

.ov-risks ul { margin: 8px 0 0; padding: 0; list-style: none; display: grid; grid-template-columns: 1fr; gap: 5px 0; }
.risk { display: grid; grid-template-columns: 40px 1fr; gap: 8px; padding: 3px 0; font-size: 11px; line-height: 1.35; align-items: start; }
.risk-badge {
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.06em;
  padding: 2px 6px;
  border-radius: 3px;
  text-align: center;
  height: fit-content;
}
.risk-low  .risk-badge { background: var(--paper-3); color: var(--ink-2); }
.risk-med  .risk-badge { background: var(--warn-soft); color: oklch(0.42 0.12 65); }
.risk-high .risk-badge { background: var(--danger-soft); color: var(--danger); }

.howto-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  font-size: 13px;
  color: var(--ink-2);
}
.howto-grid > div { display: flex; gap: 10px; align-items: center; }

/* ---------- change card (with persistent rail) ---------- */
.card-change {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 0;
  padding: 0;
  overflow: hidden;
}

/* persistent left rail — stable across depth levels */
.ch-rail {
  display: grid;
  grid-template-rows: auto 1fr auto;
  gap: 22px;
  padding: 28px 22px 22px;
  background: var(--paper-2);
  border-right: 1px solid oklch(0 0 0 / 0.08);
  min-width: 0;
}

.rail-top { display: flex; flex-direction: column; min-width: 0; }
.rail-num {
  display: flex; align-items: baseline; gap: 4px;
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--ink-soft);
  margin-bottom: 14px;
}
.rn-cur { font-size: 22px; color: var(--ink); font-weight: 600; letter-spacing: -0.02em; }
.rn-sep { color: var(--ink-mute); }

.rail-tag {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  padding: 3px 8px;
  background: var(--ink);
  color: var(--paper);
  border-radius: 3px;
  margin-bottom: 10px;
  white-space: nowrap;
  align-self: flex-start;
}
.rail-title {
  font-family: var(--font-serif);
  font-weight: 500;
  font-size: 26px;
  line-height: 1.08;
  letter-spacing: -0.02em;
  margin: 0 0 12px;
  text-wrap: balance;
}
.rail-scope code {
  font-size: 11.5px;
  color: var(--ink-2);
  background: var(--paper);
  padding: 2px 6px;
  border-radius: 3px;
  border: 1px solid oklch(0 0 0 / 0.08);
}
.rail-stats {
  margin-top: 10px;
  display: flex; gap: 14px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--ink-2);
}
.rail-stats em { font-style: normal; color: var(--ink-soft); font-size: 10.5px; }

.rail-mid { display: flex; flex-direction: column; gap: 10px; }
.rail-kicker {
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 0.10em;
  color: var(--ink-soft);
}
.rail-ladder { display: flex; flex-direction: column; gap: 4px; }
.rl-step {
  display: grid;
  grid-template-columns: 18px 1fr;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 6px;
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--ink-soft);
  position: relative;
  border: 1px solid transparent;
}
.rl-num { font-weight: 500; opacity: 0.6; }
.rl-name { letter-spacing: 0.02em; }
.rl-step.rl-passed { color: var(--accent-ink); }
.rl-step.rl-passed .rl-num { color: var(--accent-ink); opacity: 1; }
.rl-step.rl-active {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}
.rl-step.rl-active .rl-num { color: var(--paper); opacity: 1; font-weight: 600; }

.rail-hint {
  display: grid;
  grid-template-columns: auto 1fr auto 1fr;
  gap: 6px 8px;
  align-items: center;
  margin-top: 6px;
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--ink-soft);
}

.rail-bot { display: flex; flex-direction: column; gap: 8px; }
.rail-decision {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 10px 12px;
  border-radius: 8px;
  text-align: center;
  border: 1px solid transparent;
}
.rail-decision-pending  { background: var(--paper); color: var(--ink-soft); border-color: oklch(0 0 0 / 0.10); border-style: dashed; }
.rail-decision-approved { background: var(--accent-soft); color: var(--accent-ink); border-color: var(--accent-ink); }
.rail-decision-changes  { background: var(--warn-soft); color: oklch(0.42 0.12 65); border-color: oklch(0.55 0.14 65); }
.rail-decision-skipped  { background: var(--paper-3); color: var(--ink-soft); border-color: oklch(0 0 0 / 0.10); }

/* ---------- stage (right side, where the visual goes) ---------- */
.ch-stage {
  display: grid;
  grid-template-rows: auto 1fr;
  gap: 14px;
  padding: 22px 28px 24px;
  min-width: 0;
  min-height: 0;
  overflow: hidden;
}
.ch-stagehead {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 12px;
}
.depth-label {
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.10em;
  color: var(--ink-soft);
  text-transform: uppercase;
}
.ch-depth-pill {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--ink-soft);
  padding: 3px 8px;
  background: var(--paper-2);
  border: 1px solid oklch(0 0 0 / 0.08);
  border-radius: 3px;
  letter-spacing: 0.04em;
}

.ch-body { min-height: 0; min-width: 0; display: flex; flex-direction: column; }
.depth { flex: 1; min-height: 0; min-width: 0; display: flex; flex-direction: column; }

/* summary becomes a tight tagline on the stage */
.depth-summary {
  display: grid;
  place-items: center;
  background: var(--paper-2);
  border: 1px solid oklch(0 0 0 / 0.06);
  border-radius: var(--radius-sm);
  padding: 32px;
}
.depth-prose {
  font-family: var(--font-serif);
  font-weight: 400;
  font-size: clamp(22px, 2.4vw, 32px);
  line-height: 1.32;
  letter-spacing: -0.012em;
  color: var(--ink);
  max-width: 28ch;
  text-wrap: balance;
  text-align: center;
  margin: 0;
}

.depth-file { margin-bottom: 10px; }
.depth-file code { font-size: 11px; padding: 2px 8px; background: var(--paper-2); border: 1px solid oklch(0 0 0 / 0.08); border-radius: 4px; color: var(--ink-2); }

.depth-diagram { min-height: 0; flex: 1; }

.dgm-wrap { width: 100%; height: 100%; display: flex; flex-direction: column; gap: 10px; min-height: 0; }
.dgm-svg { width: 100%; height: 100%; flex: 1; min-height: 0; background: var(--paper-2); border: 1px solid oklch(0 0 0 / 0.06); border-radius: var(--radius-sm); }
.dgm-cap { font-family: var(--font-mono); font-size: 11px; color: var(--ink-soft); }
.dgm-label { font-family: var(--font-sans); font-size: 13px; font-weight: 500; }
.dgm-sub   { font-family: var(--font-sans); font-size: 11.5px; }
.dgm-mono  { font-family: var(--font-mono); font-size: 11px; }
.dgm-edge  { font-family: var(--font-mono); font-size: 10.5px; fill: var(--ink-soft); }
.dgm-section { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.10em; fill: var(--ink-soft); }

/* pseudocode */
.pseudo {
  font-family: var(--font-mono);
  font-size: 13.5px;
  line-height: 1.65;
  background: var(--paper-2);
  border: 1px solid oklch(0 0 0 / 0.06);
  border-radius: var(--radius-sm);
  padding: 22px 26px;
  margin: 0;
  white-space: pre;
  overflow: auto;
  color: var(--ink);
}

/* diff */
.diff {
  background: var(--paper-2);
  border: 1px solid oklch(0 0 0 / 0.06);
  border-radius: var(--radius-sm);
  overflow: auto;
  font-family: var(--font-mono);
  font-size: 12.5px;
  line-height: 1.55;
}
.hunk-head {
  padding: 6px 14px;
  background: var(--paper-3);
  color: var(--ink-soft);
  font-size: 11.5px;
  border-bottom: 1px solid oklch(0 0 0 / 0.06);
}
.dl { display: grid; grid-template-columns: 28px 1fr; padding: 0 8px; }
.dl-add { background: oklch(0.95 0.05 145); }
.dl-del { background: oklch(0.95 0.04 25); }
.dl-gutter { color: var(--ink-soft); text-align: center; user-select: none; }
.dl-add .dl-gutter { color: var(--accent-ink); }
.dl-del .dl-gutter { color: var(--danger); }
.dl-text { white-space: pre; }

/* ladder */
.ch-foot {
  border-top: 1px dashed oklch(0 0 0 / 0.12);
  padding-top: 14px;
}
.ladder { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.ladder-cap { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.08em; color: var(--ink-soft); }
.ladder-step {
  display: inline-flex; gap: 6px; align-items: center;
  padding: 4px 10px;
  border-radius: 999px;
  background: var(--paper-2);
  border: 1px solid oklch(0 0 0 / 0.08);
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-soft);
}
.ladder-num { font-weight: 600; color: var(--ink); }
.ladder-passed { opacity: 0.5; }
.ladder-active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.ladder-active .ladder-num { color: var(--paper); }
.ladder-hint { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-mute); margin-left: auto; }

/* ---------- action rail ---------- */
.rail {
  position: absolute;
  right: 18px; top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 14px;
  z-index: 4;
}
.rail-depth {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  background: var(--paper);
  border: 1px solid oklch(0 0 0 / 0.10);
  border-radius: 10px;
  padding: 10px 12px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-soft);
  box-shadow: var(--shadow-card);
}
.rail-depth:disabled { opacity: 0.35; cursor: not-allowed; }
.rail-decisions {
  display: flex; flex-direction: column;
  background: var(--paper);
  border: 1px solid oklch(0 0 0 / 0.10);
  border-radius: 14px;
  padding: 8px;
  gap: 4px;
  box-shadow: var(--shadow-deep);
}
.rail-btn {
  display: grid;
  grid-template-columns: 26px 1fr;
  align-items: center;
  gap: 10px;
  padding: 12px 16px 12px 10px;
  border: 0;
  background: transparent;
  border-radius: 10px;
  text-align: left;
  font-size: 13.5px;
  color: var(--ink);
  transition: background 120ms ease, transform 120ms ease;
}
.rail-btn:hover { background: var(--paper-2); }
.rail-btn .rail-key {
  display: grid; place-items: center;
  width: 24px; height: 24px;
  border-radius: 6px;
  background: var(--paper-3);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
}
.rail-approve.is-active { background: var(--accent-soft); color: var(--accent-ink); }

  <script type="text/babel" data-presets="env,react" data-type="module" id="app">
/* global React, ReactDOM, Diagram, PR_DATA */
const { useState, useEffect, useMemo, useRef, useCallback } = React;

const PR = window.PR_DATA;

// ---------- helpers ----------

// ---------- top chrome ----------
function TopBar({ x, y, totalX, depthsForCol, decisions, onJumpHome }) {

function ChangeCard({ change, depth, depthIdx, totalDepths, decision, changeNum, totalChanges }) {
  return (
    <div className="card card-change">
      <aside className="ch-rail">
        <div className="rail-top">
          <div className="rail-num">
            <span className="rn-cur">{String(changeNum).padStart(2,'0')}</span>
            <span className="rn-sep">/</span>
            <span className="rn-tot">{String(totalChanges).padStart(2,'0')}</span>

          <h2 className="rail-title">{change.title}</h2>
          <div className="rail-scope">
            <code>{change.scope}</code>
          </div>
          <div className="rail-stats">
            <span>{change.filesTouched} <em>files</em></span>
            <span><span className="add">+{change.additions}</span></span>
            <span><span className="del">−{change.deletions}</span></span>
          </div>
        </div>

        <div className="rail-mid">
          <div className="rail-kicker">GRANULARITY</div>
          <div className="rail-ladder">
            {change.depths.map((d, i) => (
              <div key={i} className={cls("rl-step", i === depthIdx && "rl-active", i < depthIdx && "rl-passed")}>
                <span className="rl-num">{i + 1}</span>
                <span className="rl-name">{d.kind}</span>
                <span className="rl-bar" />
              </div>
            ))}
          </div>
          <div className="rail-hint">
            <kbd>↓</kbd><span>deeper</span>
            <kbd>↑</kbd><span>shallower</span>
          </div>
        </div>

        <div className="rail-bot">
          {decision ? (
            <div className={`rail-decision rail-decision-${decision}`}>
              {decision === "approved" && "approved"}
              {decision === "changes"  && "changes requested"}
              {decision === "skipped"  && "skipped"}
            </div>
          ) : (
            <div className="rail-decision rail-decision-pending">awaiting review</div>
          )}
        </div>
      </aside>

      <div className="ch-stage">
        <div className="ch-stagehead">
          <div className="depth-label">{depth.label}</div>
          <div className="ch-depth-pill">DEPTH {depthIdx + 1}/{totalDepths} · {depth.kind}</div>
        </div>
        <div className="ch-body">
          <DepthBody depth={depth} />
        </div>
      </div>

}

function DepthBody({ depth }) {
  if (depth.kind === "summary") {
    return (
      <div className="depth depth-summary">
        <p className="depth-prose">{depth.body}</p>
      </div>
    );
  }
  if (depth.kind === "diagram") {
    return (
      <div className="depth depth-diagram">
        <Diagram schema={depth.schema} />
      </div>
    );
  }
  if (depth.kind === "pseudocode") {
    const items = Array.isArray(depth.files)
      ? depth.files
      : (depth.body ? [{ file: "", text: depth.body, mono: true }] : []);
    return (
      <div className="depth depth-pseudo">
        {items.map((it, i) => (
          <div key={i} className="pseudo-row">
            {it.file && <div className="pseudo-row-file"><code>{it.file}</code></div>}
            {it.mono
              ? <pre className="pseudo">{it.text}</pre>
              : <div className="pseudo-row-text">{it.text}</div>}
          </div>
        ))}
      </div>
    );
  }
  if (depth.kind === "diff") {
    return (
      <div className="depth depth-diff">
        <div className="depth-file"><code>{depth.file}</code></div>
        <div className="diff">
          {depth.hunks.map((h, i) => (
            <div key={i} className="hunk">
              <div className="hunk-head">{h.header}</div>
              {h.lines.map((ln, j) => (
                <div key={j} className={`dl dl-${ln.t}`}>
                  <span className="dl-gutter">
                    {ln.t === "add" ? "+" : ln.t === "del" ? "−" : " "}
                  </span>
                  <span className="dl-text">{ln.n || "\u00A0"}</span>
                </div>
              ))}
            </div>
          ))}
        </div>
      </div>
    );
  }
  return null;
}

function DepthLadder({ current, depths }) {
  return (
    <div className="ladder">
      <span className="ladder-cap">GRANULARITY</span>
      {depths.map((d, i) => (
        <span key={i} className={cls("ladder-step", i === current && "ladder-active", i < current && "ladder-passed")}>
          <span className="ladder-num">{i + 1}</span>
          <span className="ladder-name">{d.kind}</span>
        </span>
      ))}
      <span className="ladder-hint">↓ deeper</span>
    </div>
  );
}

// ---------- side action rail ----------
function ActionRail({ x, decision, onApprove, onChanges, onSkip, onDeeper, onShallower, canDeep, canShallow }) {
  if (x === 0) return null;
  return (
    <div className="rail">
      <button className="rail-depth" onClick={onShallower} disabled={!canShallow} title="Less detail (↑)">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M6 14l6-6 6 6" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="square" /></svg>
        <span>shallower</span>
      </button>

      <div className="rail-decisions">
        <button className={cls("rail-btn rail-approve", decision === "approved" && "is-active")} onClick={onApprove}>
          <span className="rail-key">A</span>
          <span className="rail-label">Approve</span>
        </button>
        <button className={cls("rail-btn rail-changes", decision === "changes" && "is-active")} onClick={onChanges}>
          <span className="rail-key">R</span>
          <span className="rail-label">Request changes</span>
        </button>
        <button className={cls("rail-btn rail-skip", decision === "skipped" && "is-active")} onClick={onSkip}>
          <span className="rail-key">S</span>
          <span className="rail-label">Skip</span>
        </button>
      </div>

      <button className="rail-depth" onClick={onDeeper} disabled={!canDeep} title="More detail (↓)">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M6 10l6 6 6-6" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="square" /></svg>
        <span>deeper</span>
      </button>
    </div>

}

// ---------- the canvas (panning grid of cards) ----------
function Canvas({ x, y, columns, decisions, onSwipe }) {
  // each column has its own y offset (tracks the depth user is at on that column)
  // x and y refer to current cell. We render every cell in the lattice with absolute transforms.
  const colWidthPct = 100;

  return (
    <div className="canvas-clip">
      <div
        className="canvas"
        style={{
          transform: `translate3d(${-x * colWidthPct}vw, 0, 0)`
        }}

        {columns.map((col, ci) => (
          <div
            key={ci}

            style={{ left: `${ci * colWidthPct}vw` }}
          >
            <div
              className="col-stack"
              style={{ transform: `translate3d(0, ${ci === x ? -y * 100 : 0}%, 0)` }}
            >
              {col.map((cellNode, ri) => (
                <div
                  key={ri}
                  className={cls("cell", ci === x && ri === y && "cell-focus")}
                  style={{ top: `${ri * 100}%` }}
                  data-screen-label={ci === 0 ? "00 Overview" : `${String(ci).padStart(2,'0')} ${PR.changes[ci-1].title} · depth ${ri+1}`}
                >
                  {cellNode}
                </div>
              ))}
            </div>
          </div>
        ))}

    </div>
  );
}

// ---------- finish modal ----------
function FinishOverlay({ open, decisions, onClose, onPost }) {
  if (!open) return null;
  const total = PR.changes.length;
  const done = decisions.approved + decisions.changes + decisions.skipped;
  return (
    <div className="overlay" onClick={onClose}>
      <div className="finish" onClick={e => e.stopPropagation()}>
        <div className="finish-head">
          <div className="kicker">REVIEW READY TO POST</div>

        </div>
        <ul className="finish-list">
          {PR.changes.map((c, i) => {
            const d = decisions.byChange[i] || "pending";
            return (
              <li key={c.id} className={`finish-row finish-${d}`}>
                <span className="finish-dot" />

        <div className="finish-actions">

          </button>

}

// ---------- the App ----------
function App() {
  // (x,y): x=0 is overview, x=1..N is each change. y=depth within that change.
  const [x, setX] = useState(0);
  const [y, setY] = useState(0);
  const [showFinish, setShowFinish] = useState(false);
  const [posted, setPosted] = useState(false);

  // decisions per change index (0..N-1 for changes array)
  const [byChange, setByChange] = useState({}); // { changeIdx: "approved" | "changes" | "skipped" }

  // build columns (each column is array of cells)
  const columns = useMemo(() => {
    const cols = [];
    cols.push([<OverviewCard key="ov" />]);
    PR.changes.forEach((change, ci) => {
      const cells = change.depths.map((d, di) => (
        <ChangeCard
          key={di}
          change={change}
          depth={d}
          depthIdx={di}
          totalDepths={change.depths.length}
          decision={byChange[ci]}
          changeNum={ci + 1}
          totalChanges={PR.changes.length}
        />
      ));
      cols.push(cells);
    });
    return cols;
  }, [byChange]);

  // labels for minimap
  const colLabels = useMemo(() => {
    const cols = [["Overview"]];
    PR.changes.forEach(c => cols.push(c.depths.map(d => `${c.title} · ${d.kind}`)));
    return cols;
  }, []);

  const decisions = useMemo(() => {
    let approved = 0, changes = 0, skipped = 0;
    Object.values(byChange).forEach(v => {
      if (v === "approved") approved++;
      else if (v === "changes") changes++;
      else if (v === "skipped") skipped++;
    });
    return { approved, changes, skipped, byChange };
  }, [byChange]);

  const totalCols = columns.length;
  const curColLen = columns[x].length;

  const setDecision = useCallback((dec) => {
    if (x === 0) return;
    const ci = x - 1;
    setByChange(prev => ({ ...prev, [ci]: dec }));
    // auto-advance to next change after a beat
    setTimeout(() => {
      setX(cur => {
        if (cur < totalCols - 1) { setY(0); return cur + 1; }
        return cur;
      });
    }, 280);
  }, [x, totalCols]);

  const goto = (nx, ny) => {
    setX(Math.max(0, Math.min(totalCols - 1, nx)));
    setY(Math.max(0, ny));
  };

  useKeyNav(useCallback((e) => {
    if (e.key === "ArrowRight") {
      if (x < totalCols - 1) { setX(x + 1); setY(0); e.preventDefault(); }
      else { setShowFinish(true); }
    } else if (e.key === "ArrowLeft") {
      if (x > 0) { setX(x - 1); setY(0); e.preventDefault(); }
    } else if (e.key === "ArrowDown") {
      if (y < curColLen - 1) { setY(y + 1); e.preventDefault(); }
    } else if (e.key === "ArrowUp") {
      if (y > 0) { setY(y - 1); e.preventDefault(); }
    } else if (e.key === "a" || e.key === "A") {
      setDecision("approved");
    } else if (e.key === "r" || e.key === "R") {
      setDecision("changes");
    } else if (e.key === "s" || e.key === "S") {
      setDecision("skipped");
    } else if (e.key === "Escape") {
      setShowFinish(false);
    }
  }, [x, y, curColLen, totalCols, setDecision]));

  // wheel/touch swipes (lightweight)
  const wheelLock = useRef(0);
  const onWheel = (e) => {
    const now = Date.now();
    if (now - wheelLock.current < 320) return;
    const ax = Math.abs(e.deltaX), ay = Math.abs(e.deltaY);
    if (ax > ay && ax > 24) {
      wheelLock.current = now;
      if (e.deltaX > 0 && x < totalCols - 1) { setX(x + 1); setY(0); }
      else if (e.deltaX < 0 && x > 0) { setX(x - 1); setY(0); }
    } else if (ay > 24) {
      wheelLock.current = now;
      if (e.deltaY > 0 && y < curColLen - 1) setY(y + 1);
      else if (e.deltaY < 0 && y > 0) setY(y - 1);
    }
  };

  const allDecided = Object.keys(byChange).length === PR.changes.length
    && Object.values(byChange).every(v => v);

  return (
    <div className="app" onWheel={onWheel}>
      <TopBar
        x={x} y={y}
        totalX={totalCols}
        depthsForCol={x === 0 ? [{ label: "intro" }] : PR.changes[x-1].depths}
        decisions={decisions}
        onJumpHome={() => { setX(0); setY(0); }}
      />

      <main className="stage">
        <Canvas x={x} y={y} columns={columns} decisions={decisions} />

        <ActionRail
          x={x}
          decision={x > 0 ? byChange[x - 1] : null}
          onApprove={() => setDecision("approved")}
          onChanges={() => setDecision("changes")}
          onSkip={() => setDecision("skipped")}
          onDeeper={() => y < curColLen - 1 && setY(y + 1)}
          onShallower={() => y > 0 && setY(y - 1)}
          canDeep={y < curColLen - 1}
          canShallow={y > 0}
        />
      </main>

      <footer className="footbar">
        <MiniMap x={x} y={y} columns={colLabels} decisions={decisions} onGoto={goto} />
        <div className="footbar-r">
          <div className="progress-line">
            <div className="progress-fill" style={{ width: `${(Object.keys(byChange).length / PR.changes.length) * 100}%` }} />
          </div>
          <div className="progress-text">
            {Object.keys(byChange).length} / {PR.changes.length} changes reviewed
          </div>
          <button className="btn btn-primary btn-sm" onClick={() => setShowFinish(true)}>
            {allDecided ? "Post review" : "Finish & post"}
          </button>
        </div>
      </footer>

      <FinishOverlay
        open={showFinish}
        decisions={decisions}
        onClose={() => setShowFinish(false)}
        onPost={() => { setPosted(true); setShowFinish(false); }}
      />

      {posted && (
        <div className="toast">
          <span className="toast-dot" />
          Review posted to {PR.meta.repo} · {decisions.approved} approved, {decisions.changes} changes requested
          <button onClick={() => setPosted(false)}>×</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
