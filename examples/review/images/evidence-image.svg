<svg xmlns="http://www.w3.org/2000/svg" width="720" height="220" viewBox="0 0 720 220" role="img" aria-labelledby="title desc">
  <title id="title">Inline evidence image</title>
  <desc id="desc">A small sequence diagram used to test Markdown image rendering.</desc>
  <rect width="720" height="220" fill="#f6f7fb"/>
  <rect x="56" y="70" width="132" height="64" rx="8" fill="#ffffff" stroke="#b7c4d8"/>
  <rect x="294" y="70" width="132" height="64" rx="8" fill="#ffffff" stroke="#b7c4d8"/>
  <rect x="532" y="70" width="132" height="64" rx="8" fill="#ffffff" stroke="#b7c4d8"/>
  <text x="92" y="108" font-family="Arial, sans-serif" font-size="18" fill="#172033">Agent</text>
  <text x="328" y="108" font-family="Arial, sans-serif" font-size="18" fill="#172033">Files</text>
  <text x="560" y="108" font-family="Arial, sans-serif" font-size="18" fill="#172033">Viewer</text>
  <path d="M196 102 H284" stroke="#71809a" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M434 102 H522" stroke="#71809a" stroke-width="3" marker-end="url(#arrow)"/>
